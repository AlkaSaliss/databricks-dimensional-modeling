name: Deploy Databricks Bundle

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  DATABRICKS_AUTH_TYPE: oauth-m2m
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  BUNDLE_VAR_deployment_service_principal_name: ${{ secrets.DATABRICKS_CLIENT_ID }}

jobs:
  deploy-dev:
    name: Deploy dev
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Grant catalog permissions
        run: |
          databricks grants update catalog adventure_works_dw --json "{
            \"changes\": [
              {
                \"principal\": \"${DATABRICKS_CLIENT_ID}\",
                \"add\": [\"MANAGE\"]
              },
              {
                \"principal\": \"REDACTED_DEPLOYMENT_USER_NAME\",
                \"add\": [\"MANAGE\"]
              }
            ]
          }"

      - name: Validate dev bundle
        run: databricks bundle validate --target dev

      - name: Deploy dev bundle
        run: databricks bundle deploy --target dev

  plan-prod:
    name: Plan prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate prod bundle
        run: databricks bundle validate --target prod

      - name: Plan prod bundle
        run: databricks bundle plan --target prod

  deploy-prod:
    name: Deploy prod
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: plan-prod
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Grant catalog permissions
        run: |
          databricks grants update catalog adventure_works_dw --json "{
            \"changes\": [
              {
                \"principal\": \"${DATABRICKS_CLIENT_ID}\",
                \"add\": [\"MANAGE\"]
              },
              {
                \"principal\": \"REDACTED_DEPLOYMENT_USER_NAME\",
                \"add\": [\"MANAGE\"]
              }
            ]
          }"

      - name: Deploy prod bundle
        run: databricks bundle deploy --target prod
