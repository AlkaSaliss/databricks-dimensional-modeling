name: Deploy Databricks Bundle

on:
  push:
    branches:
      - "**"

env:
  DATABRICKS_AUTH_TYPE: oauth-m2m
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  BUNDLE_VAR_deployment_service_principal_name: ${{ secrets.DATABRICKS_CLIENT_ID }}
  BUNDLE_VAR_deployment_user_name: ${{ secrets.DATABRICKS_DEPLOYMENT_USER_NAME }}

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --only-group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  deploy-dev:
    name: Deploy dev
    if: github.ref != 'refs/heads/main'
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Grant catalog permissions
        run: |
          databricks grants update catalog adventure_works_dw --json "{
            \"changes\": [
              {
                \"principal\": \"${DATABRICKS_CLIENT_ID}\",
                \"add\": [\"MANAGE\"]
              },
              {
                \"principal\": \"${BUNDLE_VAR_deployment_user_name}\",
                \"add\": [\"MANAGE\"]
              }
            ]
          }"

      - name: Grant raw volume permissions
        run: |
          databricks grants update volume workspace.default.adventure_works_dump --json "{
            \"changes\": [
              {
                \"principal\": \"${DATABRICKS_CLIENT_ID}\",
                \"add\": [\"READ_VOLUME\"]
              },
              {
                \"principal\": \"${BUNDLE_VAR_deployment_user_name}\",
                \"add\": [\"READ_VOLUME\"]
              }
            ]
          }"

      - name: Validate dev bundle
        run: databricks bundle validate --target dev

      - name: Plan dev bundle
        run: databricks bundle plan --target dev

      - name: Deploy dev bundle
        run: databricks bundle deploy --target dev

  plan-prod:
    name: Plan prod
    if: github.ref == 'refs/heads/main'
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate prod bundle
        run: databricks bundle validate --target prod

      - name: Plan prod bundle
        run: databricks bundle plan --target prod

  deploy-prod:
    name: Deploy prod
    if: github.ref == 'refs/heads/main'
    needs: plan-prod
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Grant catalog permissions
        run: |
          databricks grants update catalog adventure_works_dw --json "{
            \"changes\": [
              {
                \"principal\": \"${DATABRICKS_CLIENT_ID}\",
                \"add\": [\"MANAGE\"]
              },
              {
                \"principal\": \"${BUNDLE_VAR_deployment_user_name}\",
                \"add\": [\"MANAGE\"]
              }
            ]
          }"

      - name: Grant raw volume permissions
        run: |
          databricks grants update volume workspace.default.adventure_works_dump --json "{
            \"changes\": [
              {
                \"principal\": \"${DATABRICKS_CLIENT_ID}\",
                \"add\": [\"READ_VOLUME\"]
              },
              {
                \"principal\": \"${BUNDLE_VAR_deployment_user_name}\",
                \"add\": [\"READ_VOLUME\"]
              }
            ]
          }"

      - name: Deploy prod bundle
        run: databricks bundle deploy --target prod
