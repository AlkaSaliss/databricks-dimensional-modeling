# The main pipeline for databricks_dimensional_modeling

resources:
  pipelines:
    adventure_works_etl:
      name: adventure_works_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/adventure_works_etl"
      development: ${var.pipeline_development_mode}

      libraries:
        - glob:
            include: "../src/adventure_works_etl/transformations/**"

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
      event_log:
        name: adventure_works_etl_event_log
        catalog: ${var.catalog}
        schema: ${var.event_log_schema}
