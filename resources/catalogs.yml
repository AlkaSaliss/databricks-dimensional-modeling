resources:
  schemas:
    prod:
      name: ${var.schema}
      comment: Schema for the AdventureWorks data warehouse dimensional model
      catalog_name: ${var.catalog}
      grants:
        - principal: ${var.deployment_user_name}
          privileges:
            - MANAGE
            - USE_SCHEMA
            - SELECT
        - principal: ${var.deployment_service_principal_name}
          privileges:
            - MANAGE
    logs:
      name: logs
      comment: Schema for pipelines logs
      catalog_name: ${var.catalog}
      grants:
        - principal: ${var.deployment_user_name}
          privileges:
            - MANAGE
        - principal: ${var.deployment_service_principal_name}
          privileges:
            - MANAGE
