# This is a Databricks asset bundle definition for databricks_dimensional_modeling.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: adventure_works_dw
  uuid: b4574b29-41b6-483c-a7b7-7cb00da17368
  engine: direct

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  deployment_service_principal_name:
    description: The service principal used by CI/CD deployments
  deployment_user_name:
    description: The user that owns and manages the prod bundle deployment
  pipeline_development_mode:
    description: Whether to run the pipeline in development mode
    default: true
  event_log_schema:
    description: The schema to use for event logs
    default: logs
  dashboard_display_name:
    description: The display name of the dashboard
    default: AdventureWorks Executive Sales Dashboard
  dataset_schema:
    description: The default schema to use for dashboard datasets

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-911569fe-22cc.cloud.databricks.com
    variables:
      catalog: adventure_works_dw
      schema: ${workspace.current_user.short_name}
      event_log_schema: dev_${workspace.current_user.short_name}_logs
      deployment_user_name: ${workspace.current_user.userName}
      dataset_schema: dev_${workspace.current_user.short_name}_${var.schema}
      dashboard_display_name: ${workspace.current_user.short_name} Executive Sales Dashboard
    run_as:
      user_name: ${workspace.current_user.userName}
  prod:
    mode: production
    workspace:
      host: https://dbc-911569fe-22cc.cloud.databricks.com
      root_path: /Workspace/Users/${var.deployment_user_name}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: adventure_works_dw
      schema: prod
      pipeline_development_mode: false
      dataset_schema: ${var.schema}
    run_as:
      service_principal_name: ${var.deployment_service_principal_name}
    permissions:
      - user_name: ${var.deployment_user_name}
        level: CAN_MANAGE
      - service_principal_name: ${var.deployment_service_principal_name}
        level: CAN_MANAGE
