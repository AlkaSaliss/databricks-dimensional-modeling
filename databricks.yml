# This is a Databricks asset bundle definition for databricks_dimensional_modeling.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: adventure_works_dw
  uuid: b4574b29-41b6-483c-a7b7-7cb00da17368
  engine: direct

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  deployment_service_principal_name:
    description: The service principal used by CI/CD deployments
    default: REDACTED_DEPLOYMENT_SERVICE_PRINCIPAL_NAME

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-911569fe-22cc.cloud.databricks.com
    variables:
      catalog: adventure_works_dw
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-911569fe-22cc.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/REDACTED_DEPLOYMENT_USER_NAME to make sure we only have a single copy.
      root_path: /Workspace/Users/REDACTED_DEPLOYMENT_USER_NAME/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: adventure_works_dw
      schema: prod
    permissions:
      - user_name: REDACTED_DEPLOYMENT_USER_NAME
        level: CAN_MANAGE
      - service_principal_name: ${var.deployment_service_principal_name}
        level: CAN_MANAGE
